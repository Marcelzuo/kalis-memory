<style>
:root {
  --color-black: #000000;
  --color-white: #FFFFFF;
  --color-ash: #888888;
  --color-gold: #C9A96E;
  --font-montserrat: 'Montserrat', sans-serif;
  --font-inter: 'Inter', sans-serif;
  --logo-kalis-size: 64px;
  --logo-kalis-weight: 300;
  --logo-kalis-ls: 22px;
  --logo-torik-size: 16px;
  --logo-torik-weight: 200;
  --logo-torik-ls: 18px;
  --logo-line-width: 32px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-inter);font-weight:300;color:var(--color-white);background:var(--color-black);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--color-gold);text-decoration:none;transition:color 0.3s}
a:hover{color:var(--color-white)}

/* ── Layout ── */
.page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;position:relative}
.page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(201,169,110,0.06) 0%,transparent 70%);pointer-events:none}

/* ── Logo ── */
.logo{text-align:center;margin-bottom:2rem}
.logo-line{width:var(--logo-line-width);height:1px;background:var(--color-gold);margin:0 auto 8px}
.logo-kalis{font-family:var(--font-montserrat);font-weight:var(--logo-kalis-weight);font-size:var(--logo-kalis-size);letter-spacing:var(--logo-kalis-ls);line-height:1.1;color:var(--color-white)}
.logo-torik{font-family:var(--font-montserrat);font-weight:var(--logo-torik-weight);font-size:var(--logo-torik-size);letter-spacing:var(--logo-torik-ls);color:var(--color-ash);display:block}

/* ── 404 Content ── */
.code{font-family:var(--font-montserrat);font-size:clamp(6rem,15vw,10rem);font-weight:200;color:var(--color-gold);line-height:1;margin-bottom:0.5rem;letter-spacing:0.02em}
.title{font-family:var(--font-montserrat);font-size:1.25rem;font-weight:300;color:var(--color-white);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:1rem}
.desc{font-family:var(--font-inter);font-size:0.95rem;font-weight:300;color:var(--color-ash);letter-spacing:0.02em;max-width:400px;text-align:center;margin-bottom:3rem}

/* ── Home Link ── */
.home-link{display:inline-block;padding:1rem 2.5rem;border:1px solid var(--color-gold);color:var(--color-gold);font-family:var(--font-montserrat);font-size:0.85rem;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.4s;background:transparent;cursor:pointer}
.home-link:hover{background:var(--color-gold);color:var(--color-black)}

@media(max-width:768px){
  .logo-kalis{font-size:2.5rem;letter-spacing:12px}
  .logo-torik{font-size:0.75rem;letter-spacing:10px}
  .code{font-size:5rem}
  .title{font-size:1rem}
  .desc{font-size:0.85rem}
}
