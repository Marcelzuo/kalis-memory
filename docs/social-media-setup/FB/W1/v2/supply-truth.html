<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalistorik — Supply Truth</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #161a16;
    font-family: 'Cormorant Garamond', 'Playfair Display', 'Times New Roman', serif;
    color: #f0ede6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* ── Deep vignette / texture overlay ── */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, #1d241d 0%, #111511 65%, #0a0d0a 100%);
    z-index: 0;
  }

  /* ── Subtle grain-like noise via repeating gradient ── */
  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: repeating-conic-gradient(#fff 0% 0.004%, #000 0.004% 0.008%);
    background-size: 3px 3px;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Gold frame inset ── */
  .frame {
    position: absolute;
    inset: 44px;
    border: 1px solid rgba(201,169,110,0.18);
    z-index: 0;
    pointer-events: none;
  }
  .frame::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(201,169,110,0.08);
    pointer-events: none;
  }

  /* ── Top editorial strip ── */
  .editorial-strip {
    position: absolute;
    top: 72px;
    left: 88px;
    right: 88px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    z-index: 2;
  }
  .editorial-strip .issuer {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 5px;
    color: rgba(201,169,110,0.7);
    text-transform: uppercase;
  }
  .editorial-strip .divider {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(201,169,110,0.35), transparent);
    margin: 0 24px;
    align-self: center;
  }
  .editorial-strip .date {
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 4px;
    color: rgba(240,237,230,0.45);
    text-transform: uppercase;
  }

  /* ── Content zone ── */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 820px;
    padding: 0 60px;
  }

  /* ── Accent label ── */
  .accent-label {
    display: inline-block;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 8px;
    color: #C9A96E;
    text-transform: uppercase;
    margin-bottom: 28px;
    position: relative;
  }
  .accent-label::after {
    content: '';
    display: block;
    width: 36px;
    height: 2px;
    background: #C9A96E;
    margin: 12px auto 0;
    opacity: 0.7;
  }

  /* ── Main quote ── */
  .quote {
    font-family: 'Playfair Display', serif;
    font-size: 58px;
    font-weight: 700;
    line-height: 1.12;
    color: #f0ede6;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }
  .quote em {
    font-style: italic;
    color: #C9A96E;
  }

  /* ── Sub line / attribution ── */
  .sub-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: rgba(240,237,230,0.55);
    letter-spacing: 1.5px;
    line-height: 1.5;
  }

  /* ── Gold separator ── */
  .gold-sep {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #C9A96E, transparent);
    margin: 32px auto;
    opacity: 0.7;
  }

  /* ── Footer logo ── */
  .footer {
    position: absolute;
    bottom: 70px;
    text-align: center;
    z-index: 2;
  }
  .footer .logo-line {
    width: 80px;
    height: 2px;
    background: #C9A96E;
    margin: 0 auto 14px;
    opacity: 0.65;
  }
  .footer .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 66px;
    font-weight: 300;
    letter-spacing: 24px;
    color: #f0ede6;
    line-height: 1;
    margin-right: -24px;
    white-space: nowrap;
  }
  .footer .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 300;
    letter-spacing: 20px;
    color: #AAA;
    margin-top: 5px;
    line-height: 1;
    margin-right: -20px;
    white-space: nowrap;
  }

  /* ── Ambient gold glow ── */
  .glow-center {
    position: absolute;
    width: 500px;
    height: 500px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(201,169,110,0.04) 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

  <div class="vignette"></div>
  <div class="grain"></div>
  <div class="frame"></div>
  <div class="glow-center"></div>

  <!-- Editorial strip -->
  <div class="editorial-strip">
    <span class="issuer">Supply Truth</span>
    <span class="divider"></span>
    <span class="date">Vol. I</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="accent-label">The Invisible Cost</div>

    <div class="quote">
      Every <em>middleman</em> between you and the factory is a tax on your margin.
    </div>

    <div class="sub-line">
      Own your supply chain. Own your profit.
    </div>

    <div class="gold-sep"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="logo-line"></div>
    <div class="brand">KALIS</div>
    <div class="tagline">TORIK</div>
  </div>

</body>
</html>
