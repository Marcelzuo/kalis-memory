<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalistorik — Skip the Middlemen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(155deg, #FF5A3C 0%, #FF3E1F 45%, #E83018 100%);
    font-family: 'Outfit', 'DM Sans', -apple-system, sans-serif;
    color: #FFFFFF;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* ══════ Accent stripes ══════ */
  .accent-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 7px;
    background: #FFD60A;
    z-index: 10;
  }
  .accent-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 7px;
    background: #0055FF;
    z-index: 10;
  }

  /* ══════ Background decorative shapes ══════ */
  .bg-circle-1 {
    position: absolute;
    width: 620px; height: 620px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.06);
    top: -180px; right: -200px;
    z-index: 0; pointer-events: none;
  }
  .bg-circle-2 {
    position: absolute;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    bottom: 80px; left: -120px;
    z-index: 0; pointer-events: none;
  }
  .bg-circle-3 {
    position: absolute;
    width: 240px; height: 240px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.07);
    top: 280px; left: -60px;
    z-index: 0; pointer-events: none;
  }
  .bg-dots {
    position: absolute;
    inset: 0;
    z-index: 0; pointer-events: none;
    opacity: 0.06;
    background-image: radial-gradient(circle, #fff 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Diagonal slash */
  .bg-slash {
    position: absolute;
    width: 500px; height: 200px;
    background: rgba(255,255,255,0.03);
    top: 40%;
    left: -100px;
    transform: rotate(-12deg);
    z-index: 0; pointer-events: none;
  }

  /* ══════ Content ══════ */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 0 80px;
    width: 100%;
  }

  /* ══════ Headline ══════ */
  .headline {
    font-family: 'Bebas Neue', 'Impact', sans-serif;
    font-size: 148px;
    font-weight: 400;
    line-height: 0.9;
    letter-spacing: 2px;
    color: #FFFFFF;
    text-transform: uppercase;
  }
  .headline-line2 {
    display: block;
    color: #FFD60A;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.08);
  }

  .subtitle {
    font-family: 'Outfit', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.85);
    margin-top: 22px;
    letter-spacing: 0.3px;
    line-height: 1.4;
  }

  /* ══════ Flow diagram ══════ */
  .flow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-top: 52px;
    position: relative;
  }

  .flow-node {
    width: 148px;
    height: 148px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .flow-node .icon {
    font-size: 42px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .flow-node .label {
    font-family: 'Outfit', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #FFFFFF;
  }

  /* Crossed-out middleman */
  .flow-node.crossed {
    border-color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.04);
  }
  .flow-node.crossed .label {
    color: rgba(255,255,255,0.55);
  }
  .flow-node.crossed .icon {
    opacity: 0.5;
  }
  .cross-mark {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120px;
    height: 4px;
    background: #FF1744;
    border-radius: 2px;
    transform: translate(-50%, -50%) rotate(-45deg);
    box-shadow: 0 0 12px rgba(255,23,68,0.5);
  }
  .cross-mark::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120px;
    height: 4px;
    background: #FF1744;
    border-radius: 2px;
    transform: translate(-50%, -50%) rotate(90deg);
    box-shadow: 0 0 12px rgba(255,23,68,0.5);
  }

  /* Highlighted YOU node */
  .flow-node.highlight {
    border-color: #00E676;
    background: rgba(0,230,118,0.18);
    box-shadow: 0 0 40px rgba(0,230,118,0.25);
  }
  .flow-node.highlight .label {
    color: #00E676;
    font-size: 20px;
  }
  .flow-node.highlight .icon {
    font-size: 48px;
  }
  .check-badge {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #00E676;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #1A1A2E;
    font-weight: 900;
    box-shadow: 0 3px 12px rgba(0,230,118,0.4);
  }

  /* Arrows between nodes */
  .flow-arrow {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    margin: 0 14px;
  }
  .flow-arrow .line {
    width: 42px;
    height: 2.5px;
    background: rgba(255,255,255,0.6);
    border-radius: 2px;
  }
  .flow-arrow .head {
    width: 0;
    height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-left: 11px solid rgba(255,255,255,0.6);
  }

  /* ══════ Bottom tagline ══════ */
  .tagline {
    font-family: 'Outfit', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #FFFFFF;
    margin-top: 48px;
    letter-spacing: 0.2px;
    line-height: 1.3;
  }
  .tagline .highlight-word {
    color: #FFD60A;
  }

  /* ══════ Logo footer ══════ */
  .logo-area {
    margin-top: 42px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .logo-line {
    width: 90px;
    height: 2px;
    background: #FFD60A;
    opacity: 0.8;
    margin-bottom: 16px;
  }
  .brand {
    font-family: 'Outfit', sans-serif;
    font-size: 58px;
    font-weight: 300;
    letter-spacing: 22px;
    color: #FFFFFF;
    line-height: 1;
    margin-right: -22px;
    white-space: nowrap;
    opacity: 0.95;
  }
  .brand-tag {
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 18px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
    line-height: 1;
    margin-right: -18px;
    white-space: nowrap;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <!-- Decorative background -->
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>
  <div class="bg-circle-3"></div>
  <div class="bg-dots"></div>
  <div class="bg-slash"></div>

  <!-- Accent stripes -->
  <div class="accent-top"></div>
  <div class="accent-bottom"></div>

  <!-- Content -->
  <div class="content">

    <!-- Headline -->
    <div class="headline">
      SKIP THE
      <span class="headline-line2">MIDDLEMEN</span>
    </div>
    <div class="subtitle">Every layer between you and the factory is a tax on your margin.</div>

    <!-- Flow diagram: Factory → Agent❌ → Distributor❌ → You✅ -->
    <div class="flow">
      <!-- Factory -->
      <div class="flow-node">
        <div class="icon">🏭</div>
        <div class="label">Factory</div>
      </div>

      <div class="flow-arrow">
        <div class="line"></div>
        <div class="head"></div>
      </div>

      <!-- Agent (crossed out) -->
      <div class="flow-node crossed">
        <div class="cross-mark"></div>
        <div class="icon">💼</div>
        <div class="label">Agent</div>
      </div>

      <div class="flow-arrow">
        <div class="line"></div>
        <div class="head"></div>
      </div>

      <!-- Distributor (crossed out) -->
      <div class="flow-node crossed">
        <div class="cross-mark"></div>
        <div class="icon">📦</div>
        <div class="label">Distributor</div>
      </div>

      <div class="flow-arrow">
        <div class="line"></div>
        <div class="head"></div>
      </div>

      <!-- You (highlighted) -->
      <div class="flow-node highlight">
        <div class="check-badge">✓</div>
        <div class="icon">🙋</div>
        <div class="label">YOU</div>
      </div>
    </div>

    <!-- Tagline -->
    <div class="tagline">
      Go factory-direct. <span class="highlight-word">Keep your margin.</span>
    </div>

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-line"></div>
      <div class="brand">KALIS</div>
      <div class="brand-tag">T O R I K</div>
    </div>

  </div>

</body>
</html>
