<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1080px;
  background: #FAF8F5;
  font-family: 'Montserrat', sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.top-accent {
  position: absolute; top: 0; left: 0; right: 0;
  height: 6px; background: #C9A96E;
}
.main-content {
  display: flex; align-items: center; gap: 80px;
  margin-top: -30px; padding: 0 60px;
}
.pie-wrap {
  position: relative;
  width: 400px; height: 400px;
}
.pie-chart {
  width: 400px; height: 400px;
  border-radius: 50%;
  background: conic-gradient(
    #2D2D2D 0deg 198deg,
    #555 198deg 277.2deg,
    #999 277.2deg 306deg,
    #ccc 306deg 327.6deg,
    #C9A96E 327.6deg 360deg
  );
}
.pie-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 180px; height: 180px;
  border-radius: 50%;
  background: #FAF8F5;
  display: flex; align-items: center;
  justify-content: center;
}
.pie-center span {
  font-size: 20px; font-weight: 600;
  color: #2D2D2D; text-align: center;
  line-height: 1.3;
}
.legend {
  display: flex; flex-direction: column; gap: 20px;
}
.legend-item {
  display: flex; align-items: center; gap: 14px;
}
.legend-dot {
  width: 14px; height: 14px; border-radius: 3px;
  flex-shrink: 0;
}
.legend-label {
  font-size: 18px; font-weight: 400;
  color: #2D2D2D;
}
.legend-pct {
  font-size: 22px; font-weight: 700;
  margin-left: auto; min-width: 50px;
  text-align: right;
}
.legend-pct.gold { color: #C9A96E; }
.section-title {
  position: absolute; top: 160px;
  font-size: 20px; font-weight: 400;
  color: #C9A96E; letter-spacing: 8px;
  text-transform: uppercase;
}
.bottom-logo {
  position: absolute; bottom: 60px;
  text-align: center;
}
.gold-line {
  width: 180px; height: 1px;
  background: #C9A96E;
  margin: 0 auto 24px auto;
}
.logo-kalis {
  font-size: 64px; font-weight: 300;
  color: #2D2D2D; letter-spacing: 22px;
}
.logo-torik {
  font-size: 16px; font-weight: 200;
  color: #888; letter-spacing: 18px;
  margin-top: 2px;
}
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="section-title">Where Your Euro Goes</div>
<div class="main-content">
  <div class="pie-wrap">
    <div class="pie-chart"></div>
    <div class="pie-center"><span>Cost<br>Breakdown</span></div>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#2D2D2D;"></div>
      <span class="legend-label">Factory</span>
      <span class="legend-pct">55%</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#555;"></div>
      <span class="legend-label">Materials</span>
      <span class="legend-pct">22%</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#999;"></div>
      <span class="legend-label">Logistics</span>
      <span class="legend-pct">8%</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ccc;"></div>
      <span class="legend-label">QC</span>
      <span class="legend-pct">6%</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#C9A96E;"></div>
      <span class="legend-label">Your Margin</span>
      <span class="legend-pct gold">9%</span>
    </div>
  </div>
</div>
<div class="bottom-logo">
  <div class="gold-line"></div>
  <div class="logo-kalis">KALIS</div>
  <div class="logo-torik">TORIK</div>
</div>
</body>
</html>
