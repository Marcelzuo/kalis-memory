<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1080px;
  background: #FAF8F5;
  font-family: 'Montserrat', sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.top-accent {
  position: absolute; top: 0; left: 0; right: 0;
  height: 6px; background: #C9A96E;
}
.main-content {
  text-align: center;
  padding: 0 100px;
  margin-top: -40px;
}
.label {
  font-size: 18px; font-weight: 400;
  color: #C9A96E; letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 40px;
}
.headline {
  font-size: 56px; font-weight: 700;
  color: #2D2D2D; line-height: 1.2;
  letter-spacing: -0.5px;
}
.headline .gold {
  color: #C9A96E;
}
.subtitle {
  font-size: 20px; font-weight: 300;
  color: #888; margin-top: 32px;
  letter-spacing: 2px;
}
.bottom-logo {
  position: absolute; bottom: 60px;
  text-align: center;
}
.gold-line {
  width: 180px; height: 1px;
  background: #C9A96E;
  margin: 0 auto 24px auto;
}
.logo-kalis {
  font-size: 64px; font-weight: 300;
  color: #2D2D2D; letter-spacing: 22px;
}
.logo-torik {
  font-size: 16px; font-weight: 200;
  color: #888; letter-spacing: 18px;
  margin-top: 2px;
}
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="main-content">
  <div class="label">European Retail Intelligence</div>
  <div class="headline">Why Do <span class="gold">63%</span> of European Retailers Source From China?</div>
  <div class="subtitle">The numbers behind the shift</div>
</div>
<div class="bottom-logo">
  <div class="gold-line"></div>
  <div class="logo-kalis">KALIS</div>
  <div class="logo-torik">TORIK</div>
</div>
</body>
</html>
