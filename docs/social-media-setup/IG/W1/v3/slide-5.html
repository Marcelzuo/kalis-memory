<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1080px;
  background: #FAF8F5;
  font-family: 'Montserrat', sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.top-accent {
  position: absolute; top: 0; left: 0; right: 0;
  height: 6px; background: #C9A96E;
}
.main-content {
  text-align: center;
  padding: 0 100px;
  margin-top: -40px;
}
.tagline {
  font-size: 64px; font-weight: 700;
  color: #2D2D2D; line-height: 1.2;
  letter-spacing: -1px;
}
.tagline .gold {
  color: #C9A96E;
}
.arrow {
  font-size: 48px; font-weight: 200;
  color: #C9A96E; margin: 40px 0;
}
.cta-url {
  font-size: 28px; font-weight: 400;
  color: #2D2D2D; letter-spacing: 3px;
}
.gold-underline {
  width: 200px; height: 2px;
  background: #C9A96E;
  margin: 20px auto 0 auto;
}
.discover {
  margin-top: 60px;
  font-size: 16px; font-weight: 400;
  color: #888; letter-spacing: 5px;
  text-transform: uppercase;
}
.bottom-logo {
  position: absolute; bottom: 60px;
  text-align: center;
}
.gold-line {
  width: 180px; height: 1px;
  background: #C9A96E;
  margin: 0 auto 24px auto;
}
.logo-kalis {
  font-size: 64px; font-weight: 300;
  color: #2D2D2D; letter-spacing: 22px;
}
.logo-torik {
  font-size: 16px; font-weight: 200;
  color: #888; letter-spacing: 18px;
  margin-top: 2px;
}
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="main-content">
  <div class="tagline">Source <span class="gold">Smarter.</span><br>Sell <span class="gold">Better.</span></div>
  <div class="arrow">↓</div>
  <div class="cta-url">kalistorik.com</div>
  <div class="gold-underline"></div>
  <div class="discover">Discover Direct Sourcing</div>
</div>
<div class="bottom-logo">
  <div class="gold-line"></div>
  <div class="logo-kalis">KALIS</div>
  <div class="logo-torik">TORIK</div>
</div>
</body>
</html>
